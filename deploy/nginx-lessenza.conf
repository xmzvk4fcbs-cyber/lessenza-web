# nginx vhost for lessenza.me — proxies to the Node server on 127.0.0.1:3000.
# Install:
#   sudo cp deploy/nginx-lessenza.conf /etc/nginx/sites-available/lessenza
#   sudo ln -s /etc/nginx/sites-available/lessenza /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# After that run certbot:  sudo certbot --nginx -d lessenza.me -d www.lessenza.me

# HTTP → HTTPS redirect (Certbot will also insert this, but explicit is safer).
server {
    listen 80;
    listen [::]:80;
    server_name lessenza.me www.lessenza.me;

    # ACME challenge must stay HTTP (certbot renew needs this path).
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lessenza.me www.lessenza.me;

    # Certbot fills these in:
    #   ssl_certificate     /etc/letsencrypt/live/lessenza.me/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/lessenza.me/privkey.pem;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

    # Upstream Node app.
    set $upstream http://127.0.0.1:3000;

    # Basic hardening.
    server_tokens off;
    client_max_body_size 2m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip (Node `compression` already does this — nginx repeat is harmless and
    # covers the rare case where compression() is off).
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml application/xml+rss
               application/manifest+json text/xml;
    gzip_min_length 1024;

    # --- API endpoints (Netlify Functions translated): pass untouched. ---
    location /api/ {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Everything else: let Node serve static + handle 404.html. ---
    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/lessenza.access.log;
    error_log  /var/log/nginx/lessenza.error.log warn;
}
