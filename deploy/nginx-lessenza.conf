# nginx vhost for lessenza.me — proxies to the Node server on 127.0.0.1:3000.
#
# Install:
#   sudo cp deploy/nginx-lessenza.conf /etc/nginx/sites-available/lessenza
#   sudo ln -s /etc/nginx/sites-available/lessenza /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then issue the cert (adds `listen 443 ssl` + ssl_certificate lines + HTTP→HTTPS
# redirect to THIS block automatically):
#   sudo certbot --nginx -d lessenza.me -d www.lessenza.me --redirect
#
# First-time install works even before certbot — this file only listens on :80
# so nginx -t passes without any certs.

server {
    listen 80;
    listen [::]:80;
    server_name lessenza.me www.lessenza.me;

    set $upstream http://127.0.0.1:3000;

    # Basic hardening.
    server_tokens off;
    # Bumped to 12 MB — admin uploads images via base64 data URL, then sharp
    # resizes to 1920×1920 JPEG-82 server-side. Matches MAX_UPLOAD_BYTES.
    client_max_body_size 12m;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip (Node `compression` also does this — nginx repeat is harmless).
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml application/xml+rss
               application/manifest+json text/xml;
    gzip_min_length 1024;

    # ACME challenge must stay HTTP (certbot renew needs this path).
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }

    # --- API endpoints (Netlify Functions translated): pass untouched. ---
    location /api/ {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --- Everything else: let Node serve static + handle 404.html. ---
    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/lessenza.access.log;
    error_log  /var/log/nginx/lessenza.error.log warn;
}
