[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  command = "echo 'static site'"
  publish = "."
  port = 8888
  targetPort = 8889
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
