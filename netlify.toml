[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  command = "python3 -m http.server 8889"
  publish = "."
  port = 8888
  targetPort = 8889
  autoLaunch = false

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin-:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions."cron-daily-digest"]
  schedule = "0 18 * * *"
# 18:00 UTC == 20:00 Europe/Podgorica during CEST (Mar–Oct).
# During CET (Nov–Feb) this runs at 19:00 local — acceptable; an adjusted second schedule would complicate things.

[functions."cron-reminder"]
  schedule = "0 * * * *"
# Runs hourly. Each run looks 23–25h ahead, so any booking gets exactly one reminder roughly 24h before.
