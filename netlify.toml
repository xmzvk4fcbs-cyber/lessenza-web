[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  command = "echo 'static site'"
  publish = "."
  port = 8888
  targetPort = 8889
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions."cron-daily-digest"]
  schedule = "0 18 * * *"
# 18:00 UTC == 20:00 Europe/Podgorica during CEST (Mar–Oct).
# During CET (Nov–Feb) this runs at 19:00 local — acceptable; an adjusted second schedule would complicate things.
